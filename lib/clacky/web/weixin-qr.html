<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信扫码登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 360px;
      width: 100%;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2dc100, #1aad19);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }
    p {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      border: 1px solid #eee;
    }
    .hint {
      font-size: 12px;
      color: #bbb;
    }
    .error {
      color: #e53e3e;
      font-size: 13px;
      padding: 12px;
      background: #fff5f5;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">微</div>
    <h1>微信扫码登录</h1>
    <p>使用微信扫描下方二维码<br>在手机上点击「确认登录」</p>
    <div id="qrcode"></div>
    <div class="hint">二维码有效期 5 分钟</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const url = params.get("url");
    const el = document.getElementById("qrcode");

    if (!url) {
      el.innerHTML = '<div class="error">缺少 url 参数</div>';
    } else {
      try {
        new QRCode(el, {
          text: url,
          width: 220,
          height: 220,
          colorDark: "#111111",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (e) {
        el.innerHTML = '<div class="error">二维码生成失败: ' + e.message + '</div>';
      }
    }
  </script>
</body>
</html>
