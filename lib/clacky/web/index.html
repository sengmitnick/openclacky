<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clacky</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">⚡ Clacky</span>
      <button id="btn-new-session" title="New Session">＋</button>
    </div>

    <!-- Combined list: sessions + tasks -->
    <div id="sidebar-list">
      <div id="session-list"></div>
      <div id="tasks-section">
        <div class="sidebar-divider">
          <span>Scheduled Tasks</span>
        </div>
        <div id="task-list-items"></div>
      </div>
      <div id="skills-section">
        <div class="sidebar-divider">
          <span>Skills</span>
        </div>
        <div id="skill-list-items"></div>
      </div>
    </div>

    <!-- Bottom nav -->
    <div id="sidebar-footer">
      <button id="btn-settings" class="sidebar-nav-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Welcome screen -->
    <div id="welcome" class="centered">
      <div class="welcome-icon">⚡</div>
      <h2>Welcome to Clacky</h2>
      <p>Create a new session or select one from the sidebar.</p>
      <button id="btn-welcome-new">New Session</button>
    </div>

    <!-- Scheduled Tasks list panel (shown when user clicks "Scheduled Tasks") -->
    <div id="task-detail-panel" style="display:none">
      <header id="task-detail-header">
        <span id="task-detail-title">Scheduled Tasks</span>
        <button id="btn-create-task" title="Create a new task">+ Create Task</button>
      </header>
      <div id="task-list-table"></div>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel" style="display:none">
      <header id="chat-header">
        <span id="chat-title">Session</span>
        <span id="chat-status" class="status-idle">idle</span>
      </header>
      <div id="messages"></div>
      <div id="input-area">
        <!-- Image preview strip (hidden when empty) -->
        <div id="image-preview-strip" style="display:none"></div>
        <div id="input-bar">
          <!-- Hidden file picker -->
          <input type="file" id="image-file-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple style="display:none">
          <button id="btn-attach" title="Attach image (or drag & drop / Ctrl+V)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea id="user-input" rows="1"
            placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
          <button id="btn-send">Send</button>
          <button id="btn-interrupt" style="display:none" title="Stop">■</button>
        </div>
      </div>
    </div>

    <!-- ── SKILLS PANEL ───────────────────────────────────────────────── -->
    <div id="skills-panel" style="display:none">
      <header id="skills-header">
        <span>Skills</span>
        <button id="btn-create-skill" title="Create a new skill">+ New Skill</button>
      </header>
      <div id="skills-body">
        <!-- Tab bar -->
        <div id="skills-tabs">
          <button class="skills-tab active" data-tab="my-skills">My Skills</button>
          <button class="skills-tab" data-tab="store">Store</button>
        </div>

        <!-- Tab: My Skills -->
        <div id="skills-tab-my" class="skills-tab-content">
          <div id="skills-list"></div>
        </div>

        <!-- Tab: Store -->
        <div id="skills-tab-store" class="skills-tab-content" style="display:none">
          <div id="skills-store-grid"></div>
        </div>
      </div>
    </div>

    <!-- ── SETTINGS PANEL ──────────────────────────────────────────────── -->
    <div id="settings-panel" style="display:none">
      <header id="settings-header">
        <span>Settings</span>
      </header>
      <div id="settings-body">

        <!-- Models section -->
        <section class="settings-section">
          <div class="settings-section-title">
            <span>AI Models</span>
            <button id="btn-add-model" class="btn-settings-add">+ Add Model</button>
          </div>
          <div id="model-cards"></div>
        </section>

      </div>
    </div>

  </main>
</div>

<!-- ── CONFIRMATION MODAL ────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box sm">
    <div id="modal-message" style="font-size:14px;line-height:1.6;margin-bottom:20px;white-space:pre-wrap"></div>
    <div class="modal-actions">
      <button id="modal-yes" class="btn-primary">Yes</button>
      <button id="modal-no"  class="btn-secondary">No</button>
    </div>
  </div>
</div>

<script src="/ws.js"></script>
<script src="/sessions.js"></script>
<script src="/tasks.js"></script>
<script src="/skills.js"></script>
<script src="/settings.js"></script>
<script src="/app.js"></script>
</body>
</html>
