<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clacky</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ──────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">⚡ Clacky</span>
      <button id="btn-new-session" title="New Session">＋</button>
    </div>

    <!-- Combined list: sessions + tasks -->
    <div id="sidebar-list">
      <div id="session-list"></div>
      <div id="tasks-section">
        <div class="sidebar-divider">
          <span>Scheduled Tasks</span>
        </div>
        <div id="task-list-items"></div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ─────────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Welcome screen -->
    <div id="welcome" class="centered">
      <div class="welcome-icon">⚡</div>
      <h2>Welcome to Clacky</h2>
      <p>Create a new session or select one from the sidebar.</p>
      <button id="btn-welcome-new">New Session</button>
    </div>

    <!-- Scheduled Tasks list panel (shown when user clicks "Scheduled Tasks") -->
    <div id="task-detail-panel" style="display:none">
      <header id="task-detail-header">
        <span id="task-detail-title">Scheduled Tasks</span>
      </header>
      <div id="task-list-table"></div>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel" style="display:none">
      <header id="chat-header">
        <span id="chat-title">Session</span>
        <span id="chat-status" class="status-idle">idle</span>
      </header>
      <div id="messages"></div>
      <div id="input-bar">
        <textarea id="user-input" rows="1"
          placeholder="Message… (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="btn-send">Send</button>
        <button id="btn-interrupt" style="display:none" title="Interrupt">■</button>
      </div>
    </div>

  </main>
</div>

<!-- ── CONFIRMATION MODAL ────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box sm">
    <div id="modal-message" style="font-size:14px;line-height:1.6;margin-bottom:20px;white-space:pre-wrap"></div>
    <div class="modal-actions">
      <button id="modal-yes" class="btn-primary">Yes</button>
      <button id="modal-no"  class="btn-secondary">No</button>
    </div>
  </div>
</div>

<script src="/ws.js"></script>
<script src="/sessions.js"></script>
<script src="/tasks.js"></script>
<script src="/app.js"></script>
</body>
</html>
